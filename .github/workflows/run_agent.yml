name: Global Copper Quantamental Agent Auto-Scheduler

on:
  schedule:
    - cron: '45 0 * * 1-5' # 🌅 早上 08:45 (北京时间) 早盘定调前瞻
    - cron: '30 6 * * 1-5' # ⚔️ 下午 14:30 (北京时间) 尾盘锁定击
  workflow_dispatch:       # 🛠️ 核心修正：这里必须是 2 个空格！与 schedule 严格平级！

jobs:
  execute-intelligence-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 赋予 Actions 显式的写权限，允许回写 CSV 时序账本
    steps:
      - name: 1. 克隆并检出最新代码仓库
        uses: actions/checkout@v3

      - name: 2. 部署云端纯净 Python 3.10 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 一键配置华尔街量化工具箱环境依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install yfinance pandas numpy scipy requests

      - name: 4. 全权点火启动多资产量化基本面核心引擎
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python main.py

      - name: 5. 跨时序自我提交 (Git Auto-Commit) —— 将今日数据同步返回仓库账本
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add quantamental_history_log.csv portfolio_state.json || true
          git commit -m "chrono: archive quantamental telemetry logs [skip ci]" || true
          git push || true
