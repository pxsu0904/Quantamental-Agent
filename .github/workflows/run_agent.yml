name: Global Copper Quantamental Agent Auto-Scheduler

on:
  schedule:
    - cron: '45 0 * * 1-5'  # 国际标准时 0:45，刚好对应东八区北京时间早上 8:45
  workflow_dispatch: # 允许手动强制触发

jobs:
  execute-intelligence-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 强行克隆并检出当前最新的代码仓库
      uses: actions/checkout@v3

    - name: 2. 在云端服务器上一键部署纯净的 Python 3.10 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 秒级拉取并安装华尔街量化核武器依赖箱 (yfinance/pandas)
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 4. 彻底点火！全权启动 Leo 的量化基本面指挥官引擎
      run: python main.py
      env:
        # 🔗 【核心修复】强行将 GitHub Secrets 里的绝密天线桥接到 Python 系统变量中
        ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
